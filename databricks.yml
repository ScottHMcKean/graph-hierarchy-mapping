bundle:
  name: graph-hierarchy-mapping

variables:
  catalog:
    default: main
  schema:
    default: graph_hierarchy_demo

resources:
  jobs:
    data_setup:
      name: "[Graph Mapping] 01 - Data Setup"
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: notebooks/01_data_setup.py
          new_cluster:
            spark_version: "15.4.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"

    mapping_agent:
      name: "[Graph Mapping] 02 - Mapping Agent"
      tasks:
        - task_key: agent
          notebook_task:
            notebook_path: notebooks/02_mapping_agent.py
          new_cluster:
            spark_version: "15.4.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: "~/.bundle/${bundle.name}/${bundle.target}"
